openapi: 3.1.0

info:
  title: 내가그린기린기록 API
  version: 0.4.0
  description: |
    내가그린기린기록 MVP API 계약.

    작성 기준:
    1. 2026-06-06 MVP 기획안
    2. Notion API 명세
    3. 이 레포의 conventions/domain 문서

    기획안과 Notion 명세가 충돌하는 경우 기획안을 우선한다.

servers:
  - url: http://localhost:8080
    description: local
  - url: https://api.example.com
    description: production [확정 필요]

security:
  - bearerAuth: []
  - cookieAuth: []

tags:
  - name: auth
    description: GitHub OAuth 인증
  - name: users
    description: 사용자 정보
  - name: onboarding
    description: 온보딩과 Persona 생성
  - name: personas
    description: 사용자 말투와 회고 성향
  - name: memos
    description: 회고 메모장
  - name: memoSummaries
    description: AI 메모 요약
  - name: dailyChatSessions
    description: MemoSummary 기반 실록이 대화
  - name: diaries
    description: 자동/수동 생성 Diary
  - name: retrospectives
    description: 기간 기반 회고 생성
  - name: streaks
    description: Memo 작성 기반 스트릭(잔디)

paths:
  /api/auth/github:
    get:
      tags: [auth]
      summary: GitHub OAuth 인증 페이지로 리다이렉트
      operationId: redirectToGitHubOAuth
      security: []
      responses:
        "302":
          description: GitHub OAuth 인증 페이지로 이동
          headers:
            Location:
              description: GitHub OAuth authorization URL
              schema:
                type: string
                format: uri
        "500":
          $ref: "#/components/responses/Error"

  /api/auth/github/callback:
    get:
      tags: [auth]
      summary: GitHub OAuth callback 처리
      description: GitHub OAuth code를 검증하고 최초 로그인 사용자는 User를 생성한다.
      operationId: handleGitHubOAuthCallback
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: GitHub OAuth authorization code
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: CSRF 방지를 위한 OAuth state
      responses:
        "302":
          description: 로그인 완료 후 프론트 URL로 이동
          headers:
            Location:
              description: 로그인 완료 후 이동할 프론트 URL
              schema:
                type: string
                format: uri
            Set-Cookie:
              description: 세션 방식 사용 시 인증 세션 쿠키
              schema:
                type: string
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/auth/logout:
    post:
      tags: [auth]
      summary: 현재 로그인 세션 또는 토큰 만료
      operationId: logout
      responses:
        "204":
          description: 로그아웃 성공
        "401":
          $ref: "#/components/responses/Error"

  /api/users/me:
    get:
      tags: [users]
      summary: 내 정보 조회
      operationId: getMe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    patch:
      tags: [users]
      summary: 내 정보 수정
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/onboarding/submissions:
    post:
      tags: [onboarding]
      summary: 온보딩 설문 제출 및 Persona 생성 요청
      description: |
        블로그 링크, 기존 글 원문, 설문 응답을 원천 이력으로 저장하고 사용자당 하나의 Persona를 생성 또는 갱신한다.
        최초 제출은 설문 기반 Explicit Preferences와 링크/원문 기반 Observed Traits를 만든 뒤 Effective Guidelines를 산출한다.
        재제출은 최신 설문으로 Explicit Preferences만 교체하고 기존 Observed Traits를 보존한 채 Effective Guidelines를 다시 계산한다.
      operationId: submitOnboarding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitOnboardingRequest"
      responses:
        "201":
          description: 제출 및 Persona 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitOnboardingResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"

  /api/onboarding/survey:
    get:
      tags: [onboarding]
      summary: 내 온보딩 설문 응답 조회
      description: 저장된 회고 스타일 설문 응답을 조회한다.
      operationId: getMyOnboardingSurvey
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingSurveyResponse"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    put:
      tags: [onboarding]
      summary: 내 온보딩 설문 응답 수정
      description: |
        설문 응답을 전체 교체하고 Persona의 Explicit Preferences만 최신 설문으로 교체한다.
        기존 Observed Traits는 삭제하거나 초기화하지 않으며, 두 영역으로 Effective Guidelines를 다시 계산한다.
        사용자당 Persona 1개와 기존 요청/응답 형상은 유지한다.
      operationId: updateMyOnboardingSurvey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOnboardingSurveyRequest"
      responses:
        "200":
          description: 설문 수정 및 Persona 통합 적용 기준 재계산 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingSurveyResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"

  /api/personas/me:
    get:
      tags: [personas]
      summary: 내 Persona 조회
      operationId: getMyPersona
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Persona"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/memos:
    get:
      tags: [memos]
      summary: 특정 날짜의 Memo 목록 조회
      description: date가 없으면 오늘 날짜를 06:00 KST 기준으로 조회한다.
      operationId: listMemos
      parameters:
        - $ref: "#/components/parameters/DateQuery"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoListResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
    post:
      tags: [memos]
      summary: Memo 생성
      description: 사용자가 하루 중 짧은 메모를 작성한다.
      operationId: createMemo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemoRequest"
      responses:
        "201":
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memo"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/memos/{memoId}:
    patch:
      tags: [memos]
      summary: Memo 수정
      description: 작성 중인 DRAFT Memo의 content를 수정한다. SUMMARIZED/ARCHIVED Memo는 수정할 수 없다.
      operationId: updateMemo
      parameters:
        - name: memoId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemoRequest"
      responses:
        "200":
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Memo"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
    delete:
      tags: [memos]
      summary: Memo 삭제
      description: 작성 중인 DRAFT Memo를 삭제한다. SUMMARIZED/ARCHIVED Memo는 삭제할 수 없다.
      operationId: deleteMemo
      parameters:
        - name: memoId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: 삭제 성공
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"

  /api/memos/summaries:
    post:
      tags: [memoSummaries]
      summary: Memo 요약 생성
      description: |
        현재 작업 공간의 Memo 전체를 분석해 카테고리별 MemoSummary를 생성한다.
        한 번의 요약 실행 안에서는 하나의 Memo가 여러 주제를 담으면 내용 단위로 분할되어 여러 MemoSummary에 반영될 수 있고, 여러 Memo 또는 내용 단위가 하나의 MemoSummary로 그룹핑될 수 있다.
        재요약은 이전 실행에서 생성된 MemoSummary를 수정하거나 새 내용을 그 안으로 흡수하지 않고, 현재 DRAFT Memo만으로 새 id를 가진 MemoSummary 레코드를 생성한다.
        같은 categoryName이 여러 실행에 걸쳐 나오더라도 서로 다른 레코드로 분리하며, 이전 레코드의 items와 chatAvailable 상태를 그대로 유지한다. 특히 chatAvailable=false인 MemoSummary는 변경하지 않는다.
        요약이 완료된 Memo는 SUMMARIZED 상태가 되고, 새 DRAFT Memo를 생성한다.
      operationId: createMemoSummaries
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemoSummariesRequest"
      responses:
        "201":
          description: 요약 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoSummaryResult"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          # 요약할 DRAFT Memo가 없음(code=NO_SUMMARIZABLE_MEMO). 전체성공/전체실패, 실패 시 Memo는 DRAFT 유지. (conventions/api.md 2-1)
          $ref: "#/components/responses/Error"
        # LLM(실록이) 호출 실패 — 재시도 가능. code=SILOK_LLM_* (conventions/api.md 7-3)
        "429":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "504":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"

  /api/memo-summaries:
    get:
      tags: [memoSummaries]
      summary: MemoSummary 목록 조회
      description: 생성된 카테고리별 MemoSummary 목록을 조회한다. 이미 대화에 사용된 MemoSummary는 chatAvailable=false로 내려주며 재선택할 수 없다. MVP에서 수정/삭제는 제공하지 않는다.
      operationId: listMemoSummaries
      parameters:
        - $ref: "#/components/parameters/DateQuery"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoSummaryListResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/daily-chat-sessions:
    get:
      tags: [dailyChatSessions]
      summary: 내 대화 세션 목록 조회 (특정 서비스 날짜)
      description: |
        특정 서비스 날짜(미지정 시 오늘, 06:00 KST 경계)의 내 DailyChatSession 전체를 상태 무관하게 반환한다.
        각 세션이 memoSummaryIds를 포함하므로, 프론트는 카테고리별 채팅을 매핑/복원할 수 있다.
      operationId: listDailyChatSessions
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyChatSessionListResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags: [dailyChatSessions]
      summary: MemoSummary 기반 대화 세션 시작
      description: |
        대화는 Memo가 아니라 하나 이상의 MemoSummary 선택으로 시작한다.
        이미 대화에 사용되어 chatAvailable=false인 MemoSummary는 선택할 수 없다.
        세션 시작 시 실록이의 첫 질문을 conversation에 추가한다.
      operationId: createDailyChatSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDailyChatSessionRequest"
      responses:
        "201":
          description: 대화 세션 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyChatSession"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
        # LLM(실록이) 호출 실패 — 재시도 가능. code=SILOK_LLM_* (conventions/api.md 7-3)
        "429":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "504":
          $ref: "#/components/responses/Error"

  /api/daily-chat-sessions/{sessionId}:
    get:
      tags: [dailyChatSessions]
      summary: 대화 세션 질문/답변 흐름 조회
      operationId: getDailyChatSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyChatSession"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/daily-chat-sessions/{sessionId}/answers:
    post:
      tags: [dailyChatSessions]
      summary: 사용자 답변 저장 및 다음 질문 반환
      description: 사용자 답변을 conversation에 추가하고, 다음 역질문 또는 마무리 멘트까지 반영된 세션을 반환한다. 이미 ENDED 상태인 세션에는 답변을 추가할 수 없다.
      operationId: submitDailyChatAnswer
      parameters:
        - $ref: "#/components/parameters/SessionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitChatAnswerRequest"
      responses:
        "200":
          description: 답변 저장 및 갱신된 세션 반환
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyChatSession"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        # LLM(실록이) 호출 실패 — 재시도 가능. code=SILOK_LLM_* (conventions/api.md 7-3)
        "429":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "504":
          $ref: "#/components/responses/Error"

  /api/daily-chat-sessions/{sessionId}/end:
    post:
      tags: [dailyChatSessions]
      summary: 대화 세션 종료
      description: 사용자가 대화를 직접 종료한다. 중간에 끝내더라도 세션은 완전히 종료된 ENDED 상태가 되며 다시 이어서 대화하지 않는다. 마무리 멘트를 conversation에 추가하고 closingMessage로 저장한다.
      operationId: endDailyChatSession
      parameters:
        - $ref: "#/components/parameters/SessionId"
      responses:
        "200":
          description: 종료 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyChatSession"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
        # LLM(실록이) 호출 실패 — 재시도 가능. code=SILOK_LLM_* (conventions/api.md 7-3)
        "429":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "504":
          $ref: "#/components/responses/Error"

  /api/diaries:
    get:
      tags: [diaries]
      summary: Diary 목록 조회 (커서 기반)
      description: 최신순으로 커서 기반 페이지네이션한다. startDate/endDate로 기간을 좁힐 수 있다.
      operationId: listDiaries
      parameters:
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiaryListResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags: [diaries]
      summary: Diary 수동 생성
      description: |
        현재 진행 중인 serviceDate를 포함해 미래가 아닌 날짜의 Diary를 수동으로 생성한다.
        자동 생성과 같은 입력 정책을 사용하며, Memo 원본과 ENDED DailyChatSession을 근거로 하고 MemoSummary는 보조 힌트로만 참고한다.
        현재 serviceDate에 이미 Diary가 있으면 최신 입력 기준으로 같은 날짜 Diary를 갱신한다.
        닫힌 과거 serviceDate에 이미 Diary가 있으면 중복 생성하지 않고 기존 Diary를 반환한다.
        미래 날짜는 생성할 수 없다.
      operationId: createDiary
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDiaryRequest"
      responses:
        "200":
          description: 기존 Diary 반환 또는 현재 serviceDate Diary 갱신 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diary"
        "201":
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diary"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
        "429":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "504":
          $ref: "#/components/responses/Error"

  /api/diaries/calendar:
    get:
      tags: [diaries]
      summary: Diary가 존재하는 날짜 목록 (달력용 경량)
      description: |
        마이페이지 달력에서 클릭 가능한 날짜만 표시하기 위한 경량 조회.
        본문(markdown 등) 없이 Diary가 존재하는 serviceDate 목록만 준다.
        startDate/endDate로 표시 범위(예: 한 달)를 좁힐 수 있다.
      operationId: listDiaryDates
      parameters:
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiaryCalendarResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/diaries/{date}:
    get:
      tags: [diaries]
      summary: 특정 날짜의 Diary 상세 조회
      description: 해당 날짜에 Diary가 아직 생성되지 않았으면 404를 반환한다.
      operationId: getDiaryByDate
      parameters:
        - name: date
          in: path
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diary"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/retrospectives:
    get:
      tags: [retrospectives]
      summary: Retrospective 목록 조회 (커서 기반)
      description: 최신순으로 커서 기반 페이지네이션한다.
      operationId: listRetrospectives
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrospectiveListResponse"
        "401":
          $ref: "#/components/responses/Error"
    post:
      tags: [retrospectives]
      summary: 기간 내 존재하는 Diary 또는 DailyContext, DailyChatSession 원문, persona.md 기반 Retrospective 생성
      description: |
        선택 기간(serviceDate)에 존재하는 Diary 또는 DailyContext, DailyChatSession 전체 대화 원문, persona.md를 입력으로 회고를 생성한다.
        확정 Diary가 있는 날짜는 Diary를 사용한다.
        Diary와 기록이 없는 과거·현재·미래 날짜는 입력에서 건너뛰되 요청한 startDate와 endDate는 결과에 유지한다.
        선택 기간에 현재 진행 중인 serviceDate가 포함되고 Diary가 없으며 내용 있는 Memo가 있다면,
        해당 날짜는 Diary 대신 당일 Memo 원본만으로 임시 DailyContext를 만들어 사용한다.
        공백 Memo는 DailyContext 입력과 입력 존재 여부에서 제외한다. 과거·미래 날짜에는 DailyContext나 placeholder를 만들지 않는다.
        이 DailyContext는 Retrospective 생성 시점의 스냅샷이며 정식 Diary를 대체하거나 저장하지 않는다.
        다음 06:00 KST에는 기존 자동 생성 흐름대로 확정 Diary가 생성된다.
        기간 내 DailyChatSession 전체 대화 원문은 DailyContext에 포함하지 않고 해당 날짜의 Diary 유무와 관계없이 직접 입력에 포함한다.
        전체 기간에 Diary, DailyContext, DailyChatSession 중 하나도 없으면 422(code=NO_RETROSPECTIVE_SOURCE)를 반환한다.
        Diary만 있거나 당일 내용 있는 Memo 기반 DailyContext만 있는 경우에도 생성할 수 있다.
        persona.md나 공백 Memo만으로는 생성하지 않는다.
        Diary는 채팅하지 않은 Memo까지 포함한 하루 전체 맥락이고, DailyChatSession 원문은 대화에서 깊어진 감정·이유·판단 기준을 보강한다.
        원본 Memo는 Diary 또는 DailyContext에 흡수된 하루 맥락으로 사용하고, MemoSummary는 Diary 생성 시 카테고리/압축 힌트로만 참고한다.
        Retrospective 생성의 기본 직접 입력으로 원본 Memo와 MemoSummary를 다시 넣지 않는다.
        persona.md가 없거나 오래돼도 graceful하게 생성한다.
        요청에 memoSummaryIds가 있으면 기간 전체 대신 선택한 카테고리(MemoSummary)의 Memo 원문과
        그 카테고리로 진행한 DailyChatSession 대화만으로 생성한다(Diary는 사용하지 않는다).
        선택한 카테고리에서 Memo 원문과 대화가 모두 없으면 422(code=NO_RETROSPECTIVE_SOURCE)를 반환한다.
      operationId: createRetrospective
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRetrospectiveRequest"
      responses:
        "201":
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Retrospective"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "422":
          $ref: "#/components/responses/Error"
        # LLM(실록이) 호출 실패 — 재시도 가능. code=SILOK_LLM_* (conventions/api.md 7-3)
        "429":
          $ref: "#/components/responses/Error"
        "502":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "504":
          $ref: "#/components/responses/Error"
        "500":
          $ref: "#/components/responses/Error"

  /api/retrospectives/categories:
    get:
      tags: [retrospectives]
      summary: 기간 내 회고 대상 카테고리(MemoSummary) 목록 조회
      description: |
        선택 기간(startDate~endDate)에 존재하는 MemoSummary(카테고리)를 최신순으로 반환한다.
        기간 회고 생성 시 포함할 카테고리를 고르는 데 사용한다. 전체 선택이 기본이며,
        빼고 싶은 카테고리를 제외한 나머지 memoSummaryIds를 생성 요청에 담는다.
      operationId: listRetrospectiveCategories
      parameters:
        - name: startDate
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetrospectiveCategoryListResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

  /api/retrospectives/{retrospectiveId}:
    get:
      tags: [retrospectives]
      summary: 생성된 Retrospective Markdown 조회
      operationId: getRetrospective
      parameters:
        - name: retrospectiveId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Retrospective"
        "401":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"

  /api/streaks/me/today:
    get:
      tags: [streaks]
      summary: 오늘 스트릭 달성 여부 조회
      description: |
        현재 로그인 사용자의 "오늘(서비스 날짜, 06:00 KST 경계)" 스트릭 달성 여부를 조회한다.
        스트릭은 해당 서비스 날짜에 내용 있는 Memo를 작성했으면 달성으로 기록된다.
        용도: 홈 화면, 잔디 위젯, 오늘 완료 표시. 미달성이면 completed=false, diaryId/generatedAt=null.
      operationId: getTodayStreak
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayStreakResponse"
        "401":
          $ref: "#/components/responses/Error"

  /api/streaks/me:
    get:
      tags: [streaks]
      summary: 스트릭 요약 + 잔디 데이터 조회
      description: |
        현재 로그인 사용자의 스트릭 요약(현재/최장/총 달성일)과 날짜별 달성 여부(잔디)를 조회한다.
        startDate/endDate 미지정 시 최근 6개월을 기본 범위로 한다. 요약 수치(current/longest/total)는
        전체 기록 기준, days 배열은 조회 범위 기준이다.
      operationId: getStreakSummary
      parameters:
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreakSummaryResponse"
        "400":
          $ref: "#/components/responses/Error"
        "401":
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    cookieAuth:
      type: apiKey
      in: cookie
      name: SESSION

  parameters:
    DateQuery:
      name: date
      in: query
      required: false
      schema:
        type: string
        format: date
      description: 조회할 날짜. 없으면 오늘 날짜를 06:00 KST 기준으로 조회한다.
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: opaque 커서. 서버가 준 nextCursor를 그대로 전달한다. 없으면 첫 페이지.
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: 페이지 크기.

  responses:
    Error:
      description: 에러
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: "401"
        message:
          type: string
          example: "로그인이 필요합니다."
        details:
          type: ["object", "null"]

    User:
      type: object
      required: [id, githubId, githubUsername, onboardingCompleted, createdAt]
      properties:
        id:
          type: integer
          format: int64
        githubId:
          type: string
        githubUsername:
          type: string
        profileImageUrl:
          type: ["string", "null"]
          format: uri
        nickname:
          type: ["string", "null"]
        onboardingCompleted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time

    UpdateUserRequest:
      type: object
      properties:
        nickname:
          type: string
          minLength: 1
          maxLength: 30

    SubmitOnboardingRequest:
      type: object
      required: [answers]
      properties:
        blogUrls:
          type: ["array", "null"]
          maxItems: 5
          items:
            type: string
            format: uri
            pattern: "^https?://"
          description: 사용자의 기존 블로그 또는 회고 글 HTTP(S) URL 목록. 선택값(최대 5개). 서버는 매 redirect의 scheme과 DNS/IP 및 실제 연결 peer를 재검증하고 내부 주소 및 fetch 상한 정책을 강제한다.
        rawText:
          type: ["string", "null"]
          description: 기존 회고 글 원문. 선택값.
        answers:
          type: array
          minItems: 1
          maxItems: 10
          items:
            $ref: "#/components/schemas/OnboardingAnswer"

    OnboardingAnswer:
      type: object
      required: [questionId, answer]
      properties:
        questionId:
          type: integer
          minimum: 1
          maximum: 10
        answer:
          type: string
          minLength: 1

    SubmitOnboardingResponse:
      type: object
      required: [personaId, onboardingCompleted]
      properties:
        personaId:
          type: integer
          format: int64
        onboardingCompleted:
          type: boolean

    UpdateOnboardingSurveyRequest:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          minItems: 1
          maxItems: 10
          items:
            $ref: "#/components/schemas/OnboardingAnswer"

    OnboardingSurveyResponse:
      type: object
      required: [answers, submittedAt]
      properties:
        answers:
          type: array
          items:
            $ref: "#/components/schemas/OnboardingAnswer"
        submittedAt:
          type: string
          format: date-time
          description: 설문을 제출하거나 마지막으로 수정한 시각.

    Persona:
      type: object
      required: [id, userId, tone, thinkingStyle, summary, createdAt]
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        tone:
          type: string
        thinkingStyle:
          type: string
        recurringInterests:
          type: array
          items:
            type: string
        organizingHabit:
          type: string
        retrospectionCriteria:
          type: string
        preferredStructure:
          type: string
        summary:
          type: string
        lastRefreshedAt:
          type: ["string", "null"]
          format: date-time
          description: 사용자 기록(Diary 및 종료된 DailyChatSession)으로 Observed Traits를 마지막 갱신한 시각. 설문 수정 시각은 OnboardingSurveyResponse.submittedAt으로 추적한다.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time

    MemoStatus:
      type: string
      enum: [DRAFT, SUMMARIZED, ARCHIVED]

    Memo:
      type: object
      required: [id, content, status, createdAt]
      properties:
        id:
          type: integer
          format: int64
        content:
          type: string
        status:
          $ref: "#/components/schemas/MemoStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: ["string", "null"]
          format: date-time

    MemoListResponse:
      type: object
      required: [date, memos]
      properties:
        date:
          type: string
          format: date
        memos:
          type: array
          items:
            $ref: "#/components/schemas/Memo"

    CreateMemoRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    UpdateMemoRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    CreateMemoSummariesRequest:
      type: object
      properties:
        date:
          type: string
          format: date
          description: 생략하면 오늘 날짜를 06:00 KST 기준으로 사용한다.

    MemoSummaryResult:
      type: object
      required: [date, memoSummaries, nextMemo]
      properties:
        date:
          type: string
          format: date
        memoSummaries:
          type: array
          items:
            $ref: "#/components/schemas/MemoSummary"
        nextMemo:
          $ref: "#/components/schemas/Memo"

    MemoSummaryListResponse:
      type: object
      required: [date, memoSummaries]
      properties:
        date:
          type: string
          format: date
        memoSummaries:
          type: array
          items:
            $ref: "#/components/schemas/MemoSummary"

    MemoSummaryChatDisabledReason:
      type: string
      enum: [ALREADY_CHATTED]

    MemoSummary:
      type: object
      required: [id, categoryName, summary, itemCount, items, chatAvailable, createdAt]
      properties:
        id:
          type: integer
          format: int64
        categoryName:
          type: string
        summary:
          type: string
        itemCount:
          type: integer
          minimum: 0
        items:
          type: array
          items:
            $ref: "#/components/schemas/MemoSummaryItem"
        chatAvailable:
          type: boolean
          description: 대화 시작 시 선택 가능한지 여부. 이미 대화에 사용되면 false.
        chatDisabledReason:
          oneOf:
            - $ref: "#/components/schemas/MemoSummaryChatDisabledReason"
            - type: "null"
          description: chatAvailable=false인 경우 비활성화 사유.
        createdAt:
          type: string
          format: date-time

    MemoSummaryItem:
      type: object
      # memoId(원본 Memo 연결)는 응답에서 제외한다. 프론트는 원본 연결이 필요 없고,
      # 추적은 서버 내부에서만 한다. (conventions/api.md 5-1, decisions 2026-06-09)
      required: [id, content]
      properties:
        id:
          type: integer
          format: int64
        content:
          type: string

    DailyChatSessionStatus:
      type: string
      enum: [OPEN, ENDED]

    ConversationRole:
      type: string
      enum: [SILOK, USER]

    EndedReason:
      type: string
      description: |
        세션 종료 사유. 진행 중인 세션에는 없다.
        SYSTEM_ENDED: 06:00 KST 경계에서 OPEN 세션을 시스템이 자동 종료.
      enum: [USER_ENDED, MAX_FOLLOWUP, AI_DECIDED, SYSTEM_ENDED]

    CreateDailyChatSessionRequest:
      type: object
      required: [memoSummaryIds]
      properties:
        memoSummaryIds:
          type: array
          minItems: 1
          items:
            type: integer
            format: int64

    ConversationTurn:
      type: object
      description: |
        대화 원문의 한 발화. 별도 엔티티가 아니라 세션 conversation의 한 줄이다.
        순서는 배열 순서로 보장한다(별도 sequence 필드를 두지 않는다).
      required: [role, content]
      properties:
        role:
          $ref: "#/components/schemas/ConversationRole"
        content:
          type: string
        createdAt:
          type: ["string", "null"]
          format: date-time
          description: 발화 시각(선택). UI 시간 표시용. 순서 기준은 아니다.

    DailyChatSession:
      type: object
      required: [sessionId, serviceDate, status, followUpCount, maxFollowUpCount, memoSummaryIds, conversation]
      properties:
        sessionId:
          type: integer
          format: int64
        serviceDate:
          type: string
          format: date
          description: 세션이 속한 서비스 날짜(06:00 KST 경계). 스트릭·다이어리의 날짜 기준과 동일하다.
        status:
          $ref: "#/components/schemas/DailyChatSessionStatus"
        followUpCount:
          type: integer
          description: 누적 역질문 횟수
          minimum: 0
          maximum: 10
        maxFollowUpCount:
          type: integer
          description: 역질문 상한
          default: 10
        memoSummaryIds:
          type: array
          description: 세션 시작 시 선택한 MemoSummary 목록
          items:
            type: integer
            format: int64
        conversation:
          type: array
          description: 전체 대화 원문. 실록이 질문·사용자 답변·마무리 멘트를 순서대로 담는다.
          items:
            $ref: "#/components/schemas/ConversationTurn"
        endedReason:
          $ref: "#/components/schemas/EndedReason"
        closingMessage:
          type: ["string", "null"]
          description: 종료 시 실록이 마무리 멘트
        createdAt:
          type: string
          format: date-time
        endedAt:
          type: ["string", "null"]
          format: date-time

    DailyChatSessionListResponse:
      type: object
      required: [date, sessions]
      properties:
        date:
          type: string
          format: date
          description: 조회 기준 서비스 날짜(06:00 KST).
        sessions:
          type: array
          description: 해당 서비스 날짜의 내 대화 세션 전체(상태 무관, 생성순).
          items:
            $ref: "#/components/schemas/DailyChatSession"

    SubmitChatAnswerRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          description: 사용자 답변 내용

    Diary:
      type: object
      required: [id, date, summary, markdown, createdAt]
      properties:
        id:
          type: integer
          format: int64
        date:
          type: string
          format: date
        summary:
          type: string
          description: 회고 생성에 사용할 하루 요약
        mainEvents:
          type: array
          items:
            type: string
        emotionContext:
          type: string
        concerns:
          type: string
        newCriteria:
          type: string
        nextActions:
          type: string
        markdown:
          type: string
          description: Diary Markdown 본문
        createdAt:
          type: string
          format: date-time

    DiaryListResponse:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Diary"
        nextCursor:
          type: ["string", "null"]
          description: 다음 페이지 커서. 마지막 페이지면 null.

    DiaryCalendarResponse:
      type: object
      required: [dates]
      properties:
        dates:
          type: array
          description: Diary가 존재하는 serviceDate(KST) 목록. 본문은 포함하지 않는다.
          items:
            type: string
            format: date

    CreateDiaryRequest:
      type: object
      required: [date]
      properties:
        date:
          type: string
          format: date
          description: 생성할 Diary의 serviceDate. 현재 진행 중인 serviceDate는 허용하고 미래 날짜는 허용하지 않는다.

    CreateRetrospectiveRequest:
      type: object
      required: [startDate, endDate]
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        memoSummaryIds:
          type: ["array", "null"]
          description: |
            회고에 포함할 카테고리(MemoSummary) id 목록. 생략하거나 비우면 기간 전체를 대상으로 기존 방식(Diary/DailyContext + 대화)으로 생성한다.
            값이 있으면 선택한 카테고리의 Memo 원문과 그 카테고리로 진행한 대화만으로 생성한다.
          items:
            type: integer
            format: int64

    RetrospectiveCategoryListResponse:
      type: object
      required: [categories]
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/RetrospectiveCategory"

    RetrospectiveCategory:
      type: object
      required: [memoSummaryId, serviceDate, categoryName, summary]
      properties:
        memoSummaryId:
          type: integer
          format: int64
        serviceDate:
          type: string
          format: date
        categoryName:
          type: string
        summary:
          type: string

    Retrospective:
      type: object
      required: [id, startDate, endDate, sourceDailyChatSessionIds, title, markdown, createdAt]
      properties:
        id:
          type: integer
          format: int64
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        sourceDailyChatSessionIds:
          type: array
          description: 회고 생성에 사용한 DailyChatSession 목록. 세션 없이 Diary 또는 당일 Memo 기반 DailyContext만 사용한 경우 빈 배열이다.
          items:
            type: integer
            format: int64
        title:
          type: string
        markdown:
          type: string
          description: 회고 Markdown 본문
        createdAt:
          type: string
          format: date-time

    RetrospectiveListResponse:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Retrospective"
        nextCursor:
          type: ["string", "null"]
          description: 다음 페이지 커서. 마지막 페이지면 null.

    TodayStreakResponse:
      type: object
      required: [streakDate, completed]
      properties:
        streakDate:
          type: string
          format: date
          description: 오늘의 서비스 날짜(06:00 KST 경계).
        completed:
          type: boolean
          description: 오늘 스트릭 달성(=해당 서비스 날짜에 내용 있는 Memo 작성) 여부.
        diaryId:
          type: ["integer", "null"]
          format: int64
          description: Memo 작성 기준 스트릭에선 보통 null(향후 그날 Diary와 연결 시 채워질 수 있음).
        generatedAt:
          type: ["string", "null"]
          format: date-time
          description: 달성 시각(Memo 작성 시각), 미달성이면 null.

    StreakDay:
      type: object
      required: [date, completed]
      properties:
        date:
          type: string
          format: date
        completed:
          type: boolean
          description: 해당 서비스 날짜에 내용 있는 Memo 작성 여부.
        diaryId:
          type: ["integer", "null"]
          format: int64
          description: Memo 작성 기준 스트릭에선 보통 null.

    StreakSummaryResponse:
      type: object
      required: [currentStreak, longestStreak, totalCompletedDays, days]
      properties:
        currentStreak:
          type: integer
          description: 오늘(또는 어제)까지 이어진 연속 달성일 수. 전체 기록 기준.
        longestStreak:
          type: integer
          description: 역대 최장 연속 달성일 수.
        totalCompletedDays:
          type: integer
          description: 누적 총 달성일 수.
        days:
          type: array
          description: 조회 범위(기본 최근 6개월)의 날짜별 달성 여부.
          items:
            $ref: "#/components/schemas/StreakDay"
