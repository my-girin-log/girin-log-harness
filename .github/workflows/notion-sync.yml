name: Notion API Sync

# openapi.yaml이 바뀌어 main에 머지되면 Notion 'API 명세' DB를 자동 갱신한다.
on:
  push:
    branches: [main]
    paths:
      - "api/openapi.yaml"
      - "harness/notion-sync/**"
  workflow_dispatch:
    inputs:
      apply:
        description: "true면 실제 반영, false면 dry-run(미리보기만)"
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harness/notion-sync
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # PR/수동 dry-run: 토큰 없이도 무엇이 바뀔지 미리보기
      - name: Dry-run (미리보기)
        if: ${{ github.event_name != 'push' && inputs.apply != true }}
        run: npm run sync:dry
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}

      # main push 또는 수동 apply=true: 실제 반영
      - name: Apply (실제 반영)
        if: ${{ github.event_name == 'push' || inputs.apply == true }}
        run: npm run sync:apply
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
